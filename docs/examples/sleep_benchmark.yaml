metadata:
  description: Sleep check
  version: "1.0"
  runs: 2
  timeout: 5
  retry: True
  retry_limit: 1

applications:
  sleep_test:
    command: >
        sleep {{sleep_ammount}} && printf "
        I slept {{sleep_ammount}}
        "

benchmarks:
  sleep_test:
    sleep_ammount:
      - 1
      - 2
