metadata:
  description: Benchmark group that fans out to multiple applications
  version: "1.0"
  runs: 1

applications:
  app_a:
    command: >
      echo "app_a size={{ size }} radix={{ radix }}"

  app_b:
    command: >
      echo "app_b size={{ size }} radix={{ radix }}"

benchmarks:
  bench_1:
    apps: [app_a, app_b]
    size: [20]
    radix: [1, 2, 3, 4]
